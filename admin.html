<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель WebMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 24px;
            color: #fff;
        }
        h1 span {
            color: #007aff;
        }
        
        /* Вход */
        #loginForm {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 40px;
            border: 0.5px solid rgba(255,255,255,0.04);
            max-width: 400px;
            margin: 40px auto;
            text-align: center;
        }
        #loginForm h2 {
            margin-bottom: 20px;
            font-weight: 700;
        }
        #loginForm input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 0.5px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.02);
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 16px;
            transition: 0.3s;
        }
        #loginForm input:focus {
            outline: none;
            border-color: #007aff;
        }
        #loginForm button {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            background: #007aff;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        #loginForm button:hover {
            background: #0055b3;
        }
        
        /* Панель */
        #adminPanel {
            display: none;
        }
        .section {
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 24px;
            border: 0.5px solid rgba(255,255,255,0.04);
            margin-bottom: 24px;
        }
        .section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #fff;
        }
        .section h2 small {
            font-weight: 400;
            font-size: 14px;
            color: #6a6a72;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 16px;
            border: 0.5px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.02);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #007aff;
        }
        input::placeholder, textarea::placeholder {
            color: #4a4a52;
        }
        select option {
            background: #1a1a22;
            color: #fff;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        .btn-primary {
            background: #007aff;
            color: #fff;
        }
        .btn-primary:hover {
            background: #0055b3;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 0.5px solid rgba(255,255,255,0.04);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.12);
        }
        .btn-danger {
            background: #ff3b30;
            color: #fff;
        }
        .btn-danger:hover {
            background: #cc2d24;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        
        .item-list {
            margin-top: 12px;
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.02);
        }
        .item:last-child {
            border-bottom: none;
        }
        .item span {
            color: #b0b0b8;
            font-size: 14px;
        }
        .item-actions {
            display: flex;
            gap: 6px;
        }
        .item-actions button {
            padding: 4px 12px;
            border-radius: 12px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        .item-actions .edit {
            background: rgba(0,122,255,0.12);
            color: #007aff;
        }
        .item-actions .delete {
            background: rgba(255,59,48,0.12);
            color: #ff3b30;
        }
        .item-actions button:hover {
            opacity: 0.7;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(0,122,255,0.12);
            color: #007aff;
        }
        .badge.popular {
            background: rgba(255,215,0,0.12);
            color: #ffd700;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #6a6a72;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #fff;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            border: 0.5px solid rgba(255,255,255,0.04);
            z-index: 9999;
            animation: toastIn 0.4s ease;
        }
        @keyframes toastIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .empty {
            color: #4a4a52;
            font-size: 14px;
            padding: 12px 0;
        }
        
        @media (max-width: 640px) {
            .row, .row-3 { grid-template-columns: 1fr; }
            #loginForm { padding: 24px; }
            .section { padding: 16px; }
            .item { flex-direction: column; align-items: flex-start; gap: 6px; }
            .item-actions { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ <span>WebMaster</span> — Админ-панель</h1>
        
        <!-- Вход -->
        <div id="loginForm">
            <h2>🔐 Вход</h2>
            <input type="password" id="adminPassword" placeholder="Введите пароль">
            <button onclick="login()">Войти</button>
        </div>
        
        <!-- Панель -->
        <div id="adminPanel">
            <!-- Тексты -->
            <div class="section">
                <h2>📄 Тексты</h2>
                <input type="text" id="editHeroDesc" placeholder="Текст в Hero">
                <input type="text" id="editAboutText" placeholder="Текст 'Обо мне'">
                <input type="text" id="editContactsText" placeholder="Текст в контактах">
                <input type="text" id="editFooterText" placeholder="Текст в футере">
                <input type="text" id="editFooterCopyright" placeholder="Копирайт">
                <button class="btn btn-primary" onclick="saveTexts()">💾 Сохранить тексты</button>
            </div>
            
            <!-- Статистика -->
            <div class="section">
                <h2>📊 Статистика</h2>
                <div class="row-3">
                    <input type="number" id="editStatProjects" placeholder="Проектов">
                    <input type="number" id="editStatClients" placeholder="Клиентов">
                    <input type="number" id="editStatHappy" placeholder="Довольных %">
                </div>
                <button class="btn btn-primary" onclick="saveStats()">💾 Сохранить статистику</button>
            </div>
            
            <!-- Услуги -->
            <div class="section">
                <h2>🛠️ Услуги <small>(CRUD)</small></h2>
                <div id="adminServices" class="item-list"></div>
                <button class="btn btn-secondary" onclick="addService()">➕ Добавить услугу</button>
            </div>
            
            <!-- Портфолио -->
            <div class="section">
                <h2>📂 Портфолио <small>(CRUD)</small></h2>
                <div id="adminPortfolio" class="item-list"></div>
                <button class="btn btn-secondary" onclick="addPortfolio()">➕ Добавить проект</button>
            </div>
            
            <!-- Тарифы -->
            <div class="section">
                <h2>💰 Тарифы <small>(CRUD)</small></h2>
                <div id="adminPricing" class="item-list"></div>
                <button class="btn btn-secondary" onclick="addPricing()">➕ Добавить тариф</button>
            </div>
            
            <!-- Особенности -->
            <div class="section">
                <h2>⭐ Особенности <small>(CRUD)</small></h2>
                <div id="adminFeatures" class="item-list"></div>
                <button class="btn btn-secondary" onclick="addFeature()">➕ Добавить особенность</button>
            </div>
            
            <!-- Этапы -->
            <div class="section">
                <h2>📌 Этапы <small>(CRUD)</small></h2>
                <div id="adminSteps" class="item-list"></div>
                <button class="btn btn-secondary" onclick="addStep()">➕ Добавить этап</button>
            </div>
            
            <!-- FAQ -->
            <div class="section">
                <h2>❓ FAQ <small>(CRUD)</small></h2>
                <div id="adminFaq" class="item-list"></div>
                <button class="btn btn-secondary" onclick="addFaq()">➕ Добавить вопрос</button>
            </div>
            
            <!-- Соцсети -->
            <div class="section">
                <h2>🔗 Соцсети <small>(CRUD)</small></h2>
                <div id="adminSocial" class="item-list"></div>
                <button class="btn btn-secondary" onclick="addSocial()">➕ Добавить контакт</button>
            </div>
            
            <!-- Экспорт/Импорт -->
            <div class="section">
                <h2>📤 Экспорт / Импорт</h2>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="exportData()">📤 Экспорт</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📥 Импорт</button>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                </div>
            </div>
            
            <a href="index.html" class="back-link">← Вернуться на сайт</a>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
